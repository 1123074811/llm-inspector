    display_name: "OpenAI"
    base_urls:
      - "https://api.openai.com"
      - "https://api.openai.com/v1"
    tls_fingerprints:
      # SHA-256 of DER-encoded server certificate (last known good)
      # Updated periodically; empty = skip TLS cert pin check
      cert_sha256: ""
    expected_headers:
      - "x-request-id"
      - "openai-organization"
    model_prefixes:
