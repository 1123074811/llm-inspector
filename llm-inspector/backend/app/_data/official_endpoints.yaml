# Anti-evasion: patterns that strongly indicate a reverse-proxy / wrapper
evasion_indicators:
  - header_mismatches: 3   # >=3 expected headers missing from official provider
  - cert_chain_depth_gt: 3 # Intermediate CA chain deeper than expected
  # TLS 1.3 handshake is 1-RTT (RFC 8446 §2). Observed wall-clock includes TCP SYN
  # + TLS ClientHello/ServerHello + Finished. With cross-continent RTT 200-350 ms
  # (Cloudflare Radar 2024 medians), normal first-handshake total: 600-1100 ms.
  # Anything >2000 ms is genuinely abnormal (queueing / proxy / re-handshake).
  # Source: RFC 8446 §2; Cloudflare Radar https://radar.cloudflare.com/quality
  - response_latency_anomaly_ms: 2000
  - missing_openai_compat_fields: ["id", "object", "created", "model"]
