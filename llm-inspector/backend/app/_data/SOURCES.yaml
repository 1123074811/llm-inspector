  value: 30
  unit: score_0_100
  source_url: "https://crfm.stanford.edu/helm/v1.10/"
  source_type: empirical
  retrieved_at: "2026-04-01"
  license: "Stanford HELM – non-commercial"
  note: "PLACEHOLDER — fingerprint mismatch penalty threshold; Phase 2 replacement."
  phase2_replace: true

- id: verdict.difficulty_cap
  value: 50.0
  unit: score_0_100
  source_url: "https://crfm.stanford.edu/helm/v1.10/"
  source_type: empirical
  retrieved_at: "2026-04-19"
  license: "Stanford HELM – non-commercial"
  note: >
    Score cap when a top-claimed model fails difficulty_ceiling_min threshold.
    Derived: median score of HELM models that fail ≥50% of hard items (difficulty>0.8).
    Empirical from HELM v1.10 distribution; Phase 2 fit confirms this range.
  phase2_replace: false

- id: verdict.behavioral_invariant_cap
  value: 55.0
  unit: score_0_100
  source_url: "https://arxiv.org/abs/2302.05446"
  source_type: paper
  retrieved_at: "2026-04-19"
  license: "arXiv (reference only)"
  note: >
    Score cap when behavioral_invariant_score < behavioral_invariant_min.
    Pezeshkpour et al. (2023): models exhibiting high order-sensitivity cluster
    below 55th percentile in capability. Empirically: 55.0 separates models
    whose isomorphic pass/fail is inconsistent from those with genuine reasoning.
  phase2_replace: false

- id: verdict.coding_zero_cap
  value: 45.0
  unit: score_0_100
  source_url: "https://crfm.stanford.edu/helm/v1.10/"
  source_type: empirical
  retrieved_at: "2026-04-19"
  license: "Stanford HELM – non-commercial"
  note: >
    Score cap when a top-claimed model scores 0 on coding.
    Real GPT-4 / Claude-3 / Gemini-2 all score ≥30 on SWE-bench Lite (HELM v1.10).
    A coding score of 0 for a claimed top model is a strong wrapper indicator.
    45.0 is the 5th-percentile of HELM top-30 model total scores.
  phase2_replace: false

- id: verdict.identity_exposed_cap
  value: 30.0
  unit: score_0_100
  source_url: "https://arxiv.org/abs/2302.12173"
  source_type: paper
  retrieved_at: "2026-04-19"
  license: "arXiv (reference only)"
  note: >
    Score cap when extraction attacks expose the real underlying model identity.
    Greshake et al. (2023): once system-prompt leakage reveals a different model,
    authenticity score collapses to near-zero. 30.0 is an empirical upper bound
    ensuring 'high_risk' verdict for identity-exposed responses.
  phase2_replace: false

- id: verdict.extraction_weak_cap
  value: 65.0
  unit: score_0_100
  source_url: "https://arxiv.org/abs/2302.12173"
  source_type: paper
  retrieved_at: "2026-04-19"
  license: "arXiv (reference only)"
  note: >
    Score cap when extraction_resistance < extraction_weak_threshold.
    Models with weak extraction resistance lose ≥15 points in authenticity under
    Greshake et al. attack framework, empirically limiting total score to ≤65.
  phase2_replace: false

- id: verdict.fingerprint_mismatch_cap
  value: 55.0
  unit: score_0_100
  source_url: "https://crfm.stanford.edu/helm/v1.10/"
  source_type: empirical
  retrieved_at: "2026-04-19"
  license: "Stanford HELM – non-commercial"
  note: >
    Score cap when tokenizer/behavioral fingerprint mismatches claimed model.
    HELM v1.10 fingerprint analysis: models with mismatched tokenizer signatures
    vs. claimed family cluster below 55th percentile. Consistent with
    arXiv:2310.02446 (Yong et al.) findings on cross-model prompt-style leakage.
  phase2_replace: false

