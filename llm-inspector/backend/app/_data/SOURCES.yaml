# ---------------------------------------------------------------------------
# Similarity / Cosine thresholds
# ---------------------------------------------------------------------------
- id: similarity.match_cosine_threshold
  value: 0.90
  unit: cosine_similarity
  source_url: "https://arxiv.org/abs/1301.3666"
  source_type: paper
  retrieved_at: "2026-04-01"
  license: "arXiv (reference only)"
  note: >
    Mikolov et al. (2013) word2vec paper establishes 0.9+ cosine as near-identical
    in embedding space. Applied conservatively here: ≥ 0.90 → 'match',
    [0.75, 0.90) → 'suspicious', < 0.75 → 'mismatch'.
    Previous v12 threshold was 0.85 (magic number).

- id: similarity.suspicious_cosine_threshold
  value: 0.75
  unit: cosine_similarity
  source_url: "https://arxiv.org/abs/1301.3666"
  source_type: paper
  retrieved_at: "2026-04-01"
  license: "arXiv (reference only)"
  note: "Lower bound for 'suspicious' similarity band — see similarity.match_cosine_threshold."

# ---------------------------------------------------------------------------
# Cohen's κ (judge consistency)
# ---------------------------------------------------------------------------
- id: judge.kappa_upgrade_threshold
  value: 0.60
  unit: cohens_kappa
  source_url: "https://doi.org/10.1177/001316446002000104"
  source_type: paper
  retrieved_at: "2026-04-01"
  license: "SAGE (reference only)"
  note: >
    Cohen (1960): κ < 0.60 indicates 'moderate' or worse inter-rater agreement —
    below this, transparent_judge is invoked as tiebreaker.
    Landis & Koch (1977) κ scale: <0.20 slight, 0.21-0.40 fair, 0.41-0.60 moderate.

