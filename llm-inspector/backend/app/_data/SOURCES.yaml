# =============================================================================
# LLM Inspector v13 — Provenance Registry
# =============================================================================
# ALL constants, thresholds, weights, lexicons, and probe templates used by
# the system MUST be registered here.
#
# Schema per entry:
#   id            : dot-notation key used in SRC["<id>"]
#   value         : the actual constant (number, string, list, …)
#   unit          : unit / type annotation
#   source_url    : authoritative URL where this value originates
#   source_type   : paper | official_doc | dataset | empirical | derived
#   retrieved_at  : ISO-8601 date the source was last verified
#   license       : SPDX identifier or short free-text
#   note          : derivation method / calculation detail
# =============================================================================

# ---------------------------------------------------------------------------
# IRT / Psychometric foundations
# ---------------------------------------------------------------------------
- id: irt.model
  value: "2PL"
  unit: model_name
  source_url: "https://link.springer.com/book/10.1007/978-0-387-89976-3"
  source_type: paper
  retrieved_at: "2026-04-01"
  license: "Springer (reference only)"
  note: >
    Birnbaum (1968) two-parameter logistic model. a=discrimination, b=difficulty.
    Lord & Novick (1968) Chapter 17.

- id: irt.theta_mean
  value: 0.0
  unit: logit
  source_url: "https://link.springer.com/book/10.1007/978-0-387-89976-3"
  source_type: paper
  retrieved_at: "2026-04-01"
  license: "Springer (reference only)"
  note: >
    IRT ability scale is centred at 0 (logit). Rasch (1960); Lord & Novick (1968).
    The previous v12 convention of mean=500/SD=100 maps to a GRE scale and is
    dropped in v13 in favour of the native logit scale, displayed as Stanine-9
    in the UI.

- id: irt.theta_sd
  value: 1.0
  unit: logit
  source_url: "https://link.springer.com/book/10.1007/978-0-387-89976-3"
  source_type: paper
  retrieved_at: "2026-04-01"
  license: "Springer (reference only)"
  note: "Reference population SD of 1.0 logit (standard unit-normal prior)."

- id: cat.sem_stop_threshold
  value: 0.35
  unit: logit_se
  source_url: "https://link.springer.com/book/10.1007/978-1-4419-0742-4"
  source_type: paper
  retrieved_at: "2026-04-01"
  license: "Springer (reference only)"
  note: >
    van der Linden & Glas (2010) Elements of Adaptive Testing, §4.3.
    SEM ≤ 0.35 logit corresponds to measurement reliability ≥ 0.88.
    Previous value 0.25 was insufficiently conservative for low-item-count LLM tests.

- id: cat.ci_stop_width
  value: 0.70
  unit: logit_ci95_width
  source_url: "https://link.springer.com/book/10.1007/978-1-4419-0742-4"
  source_type: paper
  retrieved_at: "2026-04-01"
  license: "Springer (reference only)"
  note: "95 % CI width = 2 × 1.96 × SE. CI_width < 0.70 implies SE < 0.178 logit."

- id: irt.iif_discrimination_floor
  value: 0.5
  unit: dimensionless
  source_url: "https://doi.org/10.1177/0146621614568857"
  source_type: paper
  retrieved_at: "2026-04-01"
  license: "SAGE (reference only)"
  note: >
    Hambleton & Jones (1993): Items with a < 0.5 contribute negligible information
    in standard IRT 2PL application. Used as IIF pruning floor.

- id: irt.iif_peak_floor
  value: 0.6
  unit: fisher_info
  source_url: "https://doi.org/10.1177/0146621614568857"
  source_type: paper
  retrieved_at: "2026-04-01"
  license: "SAGE (reference only)"
  note: "Items with IIF peak < 0.6 across [-3,+3] theta range pruned as low-information."

# ---------------------------------------------------------------------------
# Stanine conversion
# ---------------------------------------------------------------------------
- id: stanine.boundaries
  value: [-1.75, -1.25, -0.75, -0.25, 0.25, 0.75, 1.25, 1.75]
  unit: logit_thresholds
  source_url: "https://www.scribbr.com/statistics/stanine/"
  source_type: official_doc
  retrieved_at: "2026-04-01"
  license: "public domain methodology"
  note: >
    Standard Stanine-9 boundaries at z = ±0.25, ±0.75, ±1.25, ±1.75
    (Canfield 1951). Maps logit θ → integer 1-9.
    Stanine 5 = average (z ∈ [-0.25, +0.25]).

