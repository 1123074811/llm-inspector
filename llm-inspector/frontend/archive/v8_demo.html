<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LLM Inspector v10.0 Demo</title>

<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="v8_styles.css">

<script src="v8_components.js" defer></script>

<style>
.demo-section {
  max-width: 900px;
  margin: 0 auto;
  padding: 32px;
}

.demo-title {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 8px;
  color: var(--ink);
}

.demo-subtitle {
  font-size: 14px;
  color: var(--ink3);
  margin-bottom: 24px;
}

.demo-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}

@media (max-width: 768px) {
  .demo-grid {
    grid-template-columns: 1fr;
  }
}

.demo-card {
  background: var(--card);
  border: 1px solid var(--rule);
  border-radius: var(--radius-lg);
  padding: 20px;
}

.demo-card h3 {
  font-size: 14px;
  font-weight: 600;
  color: var(--ink2);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.demo-controls {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.code-preview {
  font-family: var(--mono);
  font-size: 11px;
  background: #1a1a1a;
  color: #d4d0c8;
  padding: 12px;
  border-radius: 4px;
  overflow-x: auto;
  max-height: 150px;
  overflow-y: auto;
  margin-top: 12px;
}

.status-indicator {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-right: 4px;
}

.status-ok { background: #1a6040; }
.status-warn { background: #7a4a00; }
.status-error { background: #8a1a1a; }

/* v10 SSE Console */
.sse-console {
  background: #000;
  color: #0f0;
  font-family: monospace;
  font-size: 12px;
  padding: 10px;
  height: 200px;
  overflow-y: scroll;
  border-radius: 6px;
  white-space: pre-wrap;
  margin-top: 10px;
}
</style>

</head>
<body>

<nav>
  <div class="nav-brand">LLM <span>Inspector</span> <span style="color: var(--ink4); font-weight: normal;">v10.0 Demo</span></div>
  <div class="nav-spacer"></div>
  <div class="nav-status" id="nav-status">ready</div>
</nav>

<div class="demo-section">
  <div class="demo-title">v10.0 前端核心功能演示</div>
  <div class="demo-subtitle">MDIRT 标准分 · SSE 实时判题日志 · CoVe 链式校验展示</div>

  <!-- ═══════════════════════ SECTION 1: Provenance Visualization ═══════════════════════ -->
  <div class="card" style="margin-bottom: 24px;">
    <div class="card-label">数据来源可视化</div>
    
    <div class="demo-grid">
      <div class="demo-card">
        <h3>📊 数据来源标记</h3>
        <div id="provenance-badges"></div>
        <div class="demo-controls">
          <button class="btn" onclick="addProvenanceBadge('irt_calibration')">添加IRT来源</button>
          <button class="btn" onclick="addProvenanceBadge('expert_annotation')">添加专家来源</button>
          <button class="btn" onclick="addProvenanceBadge('default')">添加默认来源</button>
        </div>
      </div>
      
      <div class="demo-card">
        <h3>⚙️ 阈值来源信息</h3>
        <div id="threshold-source"></div>
        <div class="demo-controls">
          <button class="btn" onclick="showThresholdSource('coverage')">覆盖率阈值</button>
          <button class="btn" onclick="showThresholdSource('confidence')">置信度阈值</button>
        </div>
      </div>
    </div>
    
    <div class="demo-card" style="margin-top: 16px;">
      <h3>🌳 数据血缘树</h3>
      <div id="data-lineage"></div>
      <div class="demo-controls">
        <button class="btn" onclick="renderDataLineage()">渲染血缘树</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════ SECTION 2: Confidence Intervals ═══════════════════════ -->
  <div class="card" style="margin-bottom: 24px;">
    <div class="card-label">MDIRT 标准分展示 (v10)</div>
    
    <div class="demo-grid">
      <div class="demo-card">
        <h3>📈 MDIRT 标准分 (均值500, 标准差100)</h3>
        <div id="confidence-intervals"></div>
        <div class="demo-controls">
          <button class="btn" onclick="addConfidenceInterval(650, 610, 690, 0.95)">高置信标准分 (650)</button>
          <button class="btn" onclick="addConfidenceInterval(500, 420, 580, 0.80)">平均标准分 (500)</button>
          <button class="btn" onclick="addConfidenceInterval(350, 250, 450, 0.70)">低置信标准分 (350)</button>
        </div>
      </div>
      
      <div class="demo-card">
        <h3>🎯 评分卡片 (含置信区间)</h3>
        <div id="score-cards"></div>
        <div class="demo-controls">
          <button class="btn" onclick="addScoreCard('A', 0.85, 0.80, 0.90)">A级评分</button>
          <button class="btn" onclick="addScoreCard('B', 0.72, 0.65, 0.78)">B级评分</button>
          <button class="btn" onclick="addScoreCard('C', 0.58, 0.50, 0.65)">C级评分</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════ SECTION 3: Real-time Judgment ═══════════════════════ -->
  <div class="card" style="margin-bottom: 24px;">
    <div class="card-label">SSE 实时日志与 CoVe 校验</div>
    
    <div class="demo-grid">
      <div class="demo-card">
        <h3>⏱️ CoVe 链式校验可视化</h3>
        <div id="judgment-process"></div>
        <div class="demo-controls">
          <button class="btn" onclick="initCoveProcess()">初始化 CoVe</button>
          <button class="btn" onclick="startJudgmentStep(0)">1. 生成验证问题</button>
          <button class="btn" onclick="startJudgmentStep(1)">2. 独立回答</button>
          <button class="btn" onclick="startJudgmentStep(2)">3. 交叉比对</button>
          <button class="btn" onclick="completeJudgmentStep(2, true)">完成判定</button>
        </div>
      </div>
      
      <div class="demo-card">
        <h3>📝 SSE 实时服务器日志流</h3>
        <div class="demo-controls">
          <button class="btn" onclick="startMockSSE()">模拟连接 SSE</button>
          <button class="btn" onclick="stopMockSSE()">断开 SSE</button>
        </div>
        <div id="sse-console" class="sse-console">等待连接...</div>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════ SECTION 4: API Status ═══════════════════════ -->
  <div class="card">
    <div class="card-label">v8 API 状态</div>
    <div id="api-status" style="font-size: 13px; color: var(--ink3);">
      检查 API 连接...
    </div>
    <div class="demo-controls" style="margin-top: 12px;">
      <button class="btn" onclick="checkApiHealth()">检查健康状态</button>
      <button class="btn" onclick="loadPluginStats()">加载插件统计</button>
      <button class="btn" onclick="loadThresholdRefs()">加载阈值参考</button>
    </div>
    <div id="api-response" class="code-preview" style="display: none;"></div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════════════
// Demo: Data Provenance Visualization
// ═══════════════════════════════════════════════════════════════

function addProvenanceBadge(source) {
  const container = document.getElementById('provenance-badges');
  const provenance = {
    source: source,
    confidence: source === 'irt_calibration' ? 0.92 : (source === 'expert_annotation' ? 0.85 : 0.5),
    timestamp: new Date().toISOString()
  };
  
  const html = window.v8Components.renderProvenanceBadge(provenance);
  const div = document.createElement('div');
  div.style.marginBottom = '8px';
  div.innerHTML = html;
  container.appendChild(div);
}

function showThresholdSource(type) {
  const container = document.getElementById('threshold-source');
  
  const thresholdInfo = type === 'coverage' ? {
    value: 0.50,
    source: 'irt_calibration_v2026q1',
    doi: '10.1000/irt2026q1'
  } : {
    value: 0.80,
    source: 'expert_annotation_v8',
    url: 'https://llm-inspector.org/docs/thresholds'
  };
  
  container.innerHTML = window.v8Components.renderThresholdSource(thresholdInfo);
}

function renderDataLineage() {
  const container = document.getElementById('data-lineage');
  
  const lineage = {
    steps: [
      {
        operation: 'test_case_loading',
        description: '测试用例加载',
        timestamp: new Date().toISOString(),
        provenance: { source: 'database', confidence: 1.0 }
      },
      {
        operation: 'weight_assignment',
        description: '权重分配 (IRT校准)',
        timestamp: new Date().toISOString(),
        provenance: { source: 'irt_calibration', confidence: 0.92 }
      },
      {
        operation: 'judgment_execution',
        description: '判题执行',
        timestamp: new Date().toISOString(),
        provenance: { source: 'plugin_system', confidence: 1.0 }
      },
      {
        operation: 'score_aggregation',
        description: '分数聚合',
        timestamp: new Date().toISOString(),
        provenance: { source: 'theta_conversion', confidence: 0.95 }
      }
    ]
  };
  
  container.innerHTML = window.v8Components.renderDataLineage(lineage);
}

// ═══════════════════════════════════════════════════════════════
// Demo: Confidence Intervals
// ═══════════════════════════════════════════════════════════════

function addConfidenceInterval(value, lower, upper, confidence) {
  const container = document.getElementById('confidence-intervals');
  
  const ci = { value, lower, upper, confidence };
  const html = window.v8Components.renderConfidenceInterval(ci);
  
  const div = document.createElement('div');
  div.style.marginBottom = '12px';
  div.innerHTML = html;
  container.appendChild(div);
}

function addScoreCard(grade, value, lower, upper) {
  const container = document.getElementById('score-cards');
  
  const scoreData = {
    value: value,
    lower: lower,
    upper: upper,
    confidence: grade === 'A' ? 0.95 : (grade === 'B' ? 0.90 : 0.85)
  };
  
  const html = window.v8Components.renderScoreWithCI(`质量等级 ${grade}`, scoreData, grade);
  
  const div = document.createElement('div');
  div.style.marginBottom = '12px';
  div.innerHTML = html;
  container.appendChild(div);
}

// ═══════════════════════════════════════════════════════════════
// Demo: Real-time Judgment Process
// ═══════════════════════════════════════════════════════════════

let judgmentViz = null;
let mockSseInterval = null;

function initCoveProcess() {
  const container = document.getElementById('judgment-process');
  container.innerHTML = '<div id="judgment-viz-container"></div>';
  
  judgmentViz = new window.v8Components.JudgmentProcessVisualizer('judgment-viz-container');
  
  judgmentViz.init([
    { id: 'step1', name: '生成验证问题', description: '基于回答生成事实核查问题' },
    { id: 'step2', name: '独立回答问题', description: '大模型独立对核查问题进行回答' },
    { id: 'step3', name: '交叉比对验证', description: '比对事实与原始回答是否矛盾' }
  ]);
}

function startJudgmentStep(index) {
  if (!judgmentViz) initCoveProcess();
  const stepIds = ['step1', 'step2', 'step3'];
  judgmentViz.startStep(stepIds[index]);
}

function completeJudgmentStep(index, passed) {
  if (!judgmentViz) return;
  const stepIds = ['step1', 'step2', 'step3'];
  judgmentViz.completeStep(stepIds[index], {
    passed: passed,
    confidence: passed ? 0.95 : 0.65
  });
}

function startMockSSE() {
  const consoleEl = document.getElementById('sse-console');
  consoleEl.innerHTML = "Connected to /api/v10/runs/mock_id/logs/stream...\n";
  
  if (mockSseInterval) clearInterval(mockSseInterval);
  
  const mockLogs = [
    { level: "info", msg: "Run submitted to task queue", kwargs: { run_id: "mock_id", async_enabled: true } },
    { level: "info", msg: "Async executing case", kwargs: { case_id: "reason_aime_2024_01", sample: 0 } },
    { level: "debug", msg: "Prompt compressed.", kwargs: { "Ratio": 0.85, "Length": "120 -> 102" } },
    { level: "info", msg: "Case done", kwargs: { case_id: "reason_aime_2024_01", pass_rate: 1.0, tokens: 420 } },
    { level: "info", msg: "v10 CAT early stopping triggered (SEM < 0.3 for all dims)", kwargs: { test_mode: "quick", cases_run: 10 } }
  ];
  
  let i = 0;
  mockSseInterval = setInterval(() => {
    if (i < mockLogs.length) {
      const log = mockLogs[i];
      const timeStr = new Date().toISOString().split('T')[1].substring(0, 8);
      const logStr = `[${timeStr}] [${log.level.toUpperCase()}] ${log.msg} | ${JSON.stringify(log.kwargs)}\n`;
      consoleEl.innerHTML += logStr;
      consoleEl.scrollTop = consoleEl.scrollHeight;
      i++;
    } else {
      clearInterval(mockSseInterval);
      consoleEl.innerHTML += "\nStream ended.\n";
    }
  }, 1000);
}

function stopMockSSE() {
  if (mockSseInterval) clearInterval(mockSseInterval);
  document.getElementById('sse-console').innerHTML += "\nDisconnected.\n";
}

// ═══════════════════════════════════════════════════════════════
// Demo: API Integration
// ═══════════════════════════════════════════════════════════════

async function checkApiHealth() {
  const statusEl = document.getElementById('api-status');
  const responseEl = document.getElementById('api-response');
  
  statusEl.innerHTML = '<span class="status-indicator status-warn"></span> 检查中...';
  
  try {
    const response = await fetch('/api/v8/health');
    const data = await response.json();
    
    statusEl.innerHTML = `<span class="status-indicator status-ok"></span> v${data.version} Phase ${data.phase} - ${data.status}`;
    responseEl.style.display = 'block';
    responseEl.textContent = JSON.stringify(data, null, 2);
  } catch (error) {
    statusEl.innerHTML = `<span class="status-indicator status-error"></span> 连接失败: ${error.message}`;
    responseEl.style.display = 'none';
  }
}

async function loadPluginStats() {
  const responseEl = document.getElementById('api-response');
  
  try {
    const response = await fetch('/api/v8/plugin-stats');
    const data = await response.json();
    
    responseEl.style.display = 'block';
    responseEl.textContent = JSON.stringify(data, null, 2);
  } catch (error) {
    responseEl.style.display = 'block';
    responseEl.textContent = `Error: ${error.message}`;
  }
}

async function loadThresholdRefs() {
  const responseEl = document.getElementById('api-response');
  
  try {
    const response = await fetch('/api/v8/references/thresholds');
    const data = await response.json();
    
    responseEl.style.display = 'block';
    responseEl.textContent = JSON.stringify(data, null, 2);
  } catch (error) {
    responseEl.style.display = 'block';
    responseEl.textContent = `Error: ${error.message}`;
  }
}

// Initialize on load
document.addEventListener('DOMContentLoaded', () => {
  checkApiHealth();
});
</script>

</body>
</html>
